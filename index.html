<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐸 Frog Rush — Arcade Runner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #060a12;
      font-family: 'Orbitron', monospace;
      overflow: hidden;
    }

    /* CRT scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* Ambient glow behind game */
    body::after {
      content: '';
      position: fixed;
      width: 900px;
      height: 500px;
      background: radial-gradient(ellipse at center, rgba(34,211,238,0.07) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }

    #game-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #game {
      display: block;
      width: 100%;
      aspect-ratio: 800 / 450;
      border: 2px solid rgba(34,211,238,0.4);
      box-shadow:
        0 0 30px rgba(34,211,238,0.2),
        0 0 60px rgba(34,211,238,0.08),
        inset 0 0 30px rgba(0,0,0,0.5);
      border-radius: 4px;
      overflow: hidden;
      background: #020b18;
    }

    #game canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    #hud-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 8px 4px;
      color: rgba(148,163,184,0.7);
      font-size: 10px;
      letter-spacing: 2px;
      font-family: 'Share Tech Mono', monospace;
    }

    #title-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 6px 4px 2px;
    }

    #title-bar .game-title {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 4px;
      color: #22d3ee;
      text-shadow: 0 0 20px rgba(34,211,238,0.6);
    }

    #title-bar .subtitle {
      font-size: 9px;
      color: rgba(100,116,139,0.8);
      letter-spacing: 3px;
      font-family: 'Share Tech Mono', monospace;
    }
  </style>
</head>
<body>
  <div id="game-wrapper">
    <div id="title-bar">
      <span class="game-title">🐸 FROG RUSH</span>
      <span class="subtitle">ARCADE EDITION v2.0</span>
    </div>
    <div id="game"></div>
    <div id="hud-bar">
      <span>SPACE / TAP → JUMP &nbsp;|&nbsp; D → DEBUG &nbsp;|&nbsp; 1/2/3 → MODE</span>
      <span>HOLD JUMP FOR HIGHER ARC</span>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
  <script>
    // Use timestamp cache-buster to ensure fresh load of game.js
    // This prevents browser cache issues with file:// URLs
    var script = document.createElement('script');
    script.src = 'game.js?' + Math.random();
    document.head.appendChild(script);
  </script>
</body>
</html>
